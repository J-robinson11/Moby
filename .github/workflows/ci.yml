name: CI checks

# Fast sanity checks on every push so broken code never reaches a scheduled run.
on:
  push:
  pull_request:
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile-check the script
        run: python -m py_compile moby.py

      - name: Import + smoke-test (no network, no API calls)
        run: |
          python - <<'PY'
          import moby

          # 1. The module imports cleanly and key functions exist.
          for fn in ("clean_markets", "summarize_holders", "parse_json_block",
                     "build_discord_payload", "send_alert", "log_signals",
                     "flatten_picks", "load_track_record", "fetch_x_sentiment",
                     "fetch_sharp_traders", "sharp_weight", "run_slot_label",
                     "prune_low_upside", "annotate_contrarian", "next_scheduled_run"):
              assert hasattr(moby, fn), f"missing function: {fn}"

          # 1b. Run-slot label snaps drifted run times to clean Central slots.
          from datetime import datetime, timezone
          assert moby.run_slot_label(datetime(2026, 6, 29, 22, 30, tzinfo=timezone.utc)) == "5:00 PM"

          # 1b2. Next-run boundary: from 12:00 PM CT (17:00 UTC) the next run is
          #      5:00 PM; after 5 PM CT (23:00 UTC = 6 PM CT) it's next-day 7 AM.
          assert moby.next_scheduled_run(datetime(2026, 6, 29, 17, 0, tzinfo=timezone.utc))[1] == "5:00 PM"
          assert moby.next_scheduled_run(datetime(2026, 6, 29, 23, 0, tzinfo=timezone.utc))[1] == "7:00 AM"
          # The 5 PM run's boundary is the next-day 7 AM run -> a ~14h "last chance"
          # window, so all evening/overnight games belong to it.
          ts_5pm, _ = moby.next_scheduled_run(datetime(2026, 6, 29, 22, 0, tzinfo=timezone.utc))  # 5 PM CT
          assert ts_5pm == datetime(2026, 6, 30, 12, 0, tzinfo=timezone.utc).timestamp()  # 7 AM CT next day

          # 1c. Zero/low-upside picks are pruned (a 100c lock must never ship).
          r = {"picks": {"game_props": [
              {"market": "lock", "pick": "Yes", "price": 1.0, "conviction": "High"},
              {"market": "value", "pick": "X", "price": 0.55, "conviction": "High"},
          ], "player_props": [], "futures": []}}
          assert moby.prune_low_upside(r, max_price=0.90) == 1
          assert [p["market"] for p in r["picks"]["game_props"]] == ["value"]

          # 2. Market classification works.
          assert moby.classify_market("Argentina vs Brazil total goals", "")[1] == "game_prop"
          assert moby.classify_market("Messi to score anytime", "")[1] == "player_prop"
          assert moby.classify_market("Brazil to win the World Cup", "")[1] == "future"

          # 3. Holder summary computes dollar-weighted lean correctly.
          market = {"outcomes": ["Yes", "No"], "implied_prob": [0.8, 0.2]}
          raw = [
              {"token": "yes", "holders": [
                  {"outcomeIndex": 0, "amount": 1000, "name": "Whale"},
              ]},
              {"token": "no", "holders": [
                  {"outcomeIndex": 1, "amount": 1000, "name": "Minnow"},
              ]},
          ]
          s = moby.summarize_holders(market, raw)
          # Yes: 1000 * 0.8 = 800; No: 1000 * 0.2 = 200 -> lean Yes ~80%
          assert s["lean_side"] == "Yes", s
          assert 75 <= s["lean_pct"] <= 85, s
          assert s["total_smart_money_usd"] == 1000, s

          # 3b. Sharp weighting: a high-PnL whale on the smaller side flips the
          #     SHARP lean even when raw money leans the other way.
          mk = {"outcomes": ["Yes", "No"], "implied_prob": [0.8, 0.2]}
          raw2 = [
              {"holders": [{"outcomeIndex": 0, "amount": 1000, "proxyWallet": "0xAAA"}]},
              {"holders": [{"outcomeIndex": 1, "amount": 2000, "proxyWallet": "0xBBB", "name": "Sharp"}]},
          ]
          sharp = {"0xbbb": {"pnl": 2_000_000, "name": "Theo4", "rank": "1"}}
          s2 = moby.summarize_holders(mk, raw2, sharp)
          assert s2["lean_side"] == "Yes", s2          # raw money on Yes
          assert s2["sharp_lean_side"] == "No", s2     # sharp money flips to No
          assert s2["sharp_traders_present"] == 1, s2
          assert moby.sharp_weight(2_000_000) == 4.0
          assert moby.sharp_weight(None) == 1.0

          # 4. JSON parsing handles a fenced block like the model returns.
          sample = '''Here is my read.
          ```json
          {"picks": {"game_props": [], "player_props": [], "futures": []},
           "watchlist": ["USA props"], "summary": "Quiet."}
          ```'''
          parsed = moby.parse_json_block(sample)
          assert parsed["summary"] == "Quiet."
          assert moby.flatten_picks(parsed) == []

          # 5. Discord payload builds for no-pick and full slates without any
          #    empty field values (Discord rejects empty fields).
          no_pick = moby.build_discord_payload(parsed)
          assert no_pick["embeds"][0]["title"]

          full = {"picks": {
              "game_props": [{
                  "market": "Argentina vs Brazil — total goals over 2.5",
                  "pick": "Over 2.5", "conviction": "High", "kickoff": "2026-06-29T18:00:00Z",
                  "smart_money": "72% of $45k on Over", "news": "Both teams attacking form.",
                  "rationale": "Big money + news agree.", "contrarian_note": "Defensive history.",
                  "tag": "contrarian", "tag_note": "sharp Over vs raw Under",
              }],
              "player_props": [{"market": "Messi to score", "pick": "Yes", "conviction": "Medium"}],
              "futures": [],
          }, "summary": "Two plays today.", "_track_record": {"note": "3/4 won (75%)."}}
          flat = moby.flatten_picks(full)
          assert len(flat) == 2 and flat[0]["bucket"] == "game_props", flat
          payload = moby.build_discord_payload(full)
          for embed in payload["embeds"]:
              for field in embed.get("fields", []):
                  assert field["value"] != "", f"empty field: {field['name']}"

          # 5b. A tagged pick gets a badge in its title AND a "Role" line;
          #     untagged picks get neither (layout otherwise unchanged).
          tagged = next(e for e in payload["embeds"] if "CONTRARIAN" in e.get("title", ""))
          assert any(f["name"] == "Role" for f in tagged["fields"]), tagged
          assert "Contrarian" in next(f["value"] for f in tagged["fields"] if f["name"] == "Role")
          plain = next(e for e in payload["embeds"] if "Messi" in e.get("description", ""))
          assert not any(f["name"] == "Role" for f in plain["fields"]), plain
          assert "CONTRARIAN" not in plain["title"] and "HEDGE" not in plain["title"]

          # 5c. Deterministic backstop: a pick opposing the raw-money lean is
          #     auto-tagged contrarian; an aligned pick is left alone; a tag the
          #     model already set is never overridden.
          rr = {"picks": {"game_props": [
              {"market": "BTTS", "pick": "Yes", "conviction": "Medium"},                 # lean No -> flip
              {"market": "Winner", "pick": "No", "conviction": "Low"},                    # aligned -> keep
              {"market": "Total", "pick": "Yes", "conviction": "Low", "tag": "hedge"},    # model tag -> keep
          ], "player_props": [], "futures": []}}
          lean = {
              "BTTS":   {"lean_side": "No", "outcomes": ["Yes", "No"]},
              "Winner": {"lean_side": "No", "outcomes": ["Yes", "No"]},
              "Total":  {"lean_side": "No", "outcomes": ["Yes", "No"]},
          }
          assert moby.annotate_contrarian(rr, lean) == 1
          gp = rr["picks"]["game_props"]
          assert gp[0]["tag"] == "contrarian", gp[0]
          assert gp[1].get("tag", "none") in ("none", None), gp[1]
          assert gp[2]["tag"] == "hedge", gp[2]  # model's tag preserved

          print("All smoke tests passed.")
          PY
